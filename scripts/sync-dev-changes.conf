# sync-dev-changes.conf - yogastudio-bergamot dev sync settings

PROJECT_NAME="yogastudio-bergamot"

# Set REMOTE_ALIAS and REMOTE_ROOT in scripts/sync-dev-changes.env.
# Keep that file out of Git because it contains environment-specific paths.

# Guard against running the sync from the wrong repository.
REQUIRED_PATHS=("functions.php" "theme.json" "vite.config.mjs" "src/css/style.scss")

EXCLUDE_PATTERNS=(
  ".git" ".git/*"
  ".gitignore"
  ".DS_Store"
  "node_modules" "node_modules/*"
  "package.json" "package-lock.json" "yarn.lock"
  "README.md" "AGENTS.md"
  "scripts" "scripts/*"
  "src" "src/*"
  "assets/.vite-build" "assets/.vite-build/*"
)

BUILD_TRIGGER_PATTERNS=(
  "src/css/*"
  "src/js/*"
  "vite.config.mjs"
  "package.json"
  "package-lock.json"
  "yarn.lock"
)

BUILD_COMMAND="npm run build"

collect_built_assets() {
  local p
  while IFS= read -r p; do
    case "$p" in
      src/css/*|src/js/*|vite.config.mjs|package.json|package-lock.json|yarn.lock)
        [[ -f "style.css" ]] && printf '%s\n' "style.css"
        [[ -f "assets/js/main.js" ]] && printf '%s\n' "assets/js/main.js"
        [[ -f "assets/.vite/manifest.json" ]] && printf '%s\n' "assets/.vite/manifest.json"
        ;;
    esac
  done
}
